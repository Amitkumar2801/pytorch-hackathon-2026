version: "1.0.0"
metadata:
  name: "Advanced-Cognitive-Agent-Env"
  description: "A simulated real-world dynamic environment designed for evaluating autonomous LLM reasoning capabilities."
  author: "Amit Kumar"

tasks:
  - id: "eval_task_001"
    name: "State Initialization"
    description: "Calibrate the initial state vector and establish connection protocols with primary API endpoints."
  - id: "eval_task_002"
    name: "Data Parsing and Normalization"
    description: "Ingest unstructured environmental inputs and transform them into a standardized JSON format for the agent."
  - id: "eval_task_003"
    name: "Algorithmic Optimization"
    description: "Execute multi-step logical reasoning to maximize the final reward metric based on dynamic feedback."
